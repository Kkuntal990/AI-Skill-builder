# Interactive debug pod for running the MLEvolve agent step-by-step against
# a real Nautilus GPU. Reuses the production mleval-agent image but swaps
# the entrypoint for `sleep infinity` so we can `kubectl exec` in and drive
# `run_mlevolve.py` (or arbitrary Python) manually before committing to a
# full Job.
#
# Originally a Jupyter pod (pre-2026-05-28); switched to plain sleep because:
#  (a) the curated mlevolve-agent image no longer bundles jupyter (~200 MB saved)
#  (b) for debugging the agent itself we want a shell with the same env vars +
#      PVC mounts the Job would see, not a notebook UI
#
# !!! DO NOT `kubectl apply -f` this file directly. !!!
# The image, registry, tag, and GPU type are envsubst placeholders that only
# resolve via `make k8s-apply-helper`. Direct apply would set the literal
# string `${IMAGE_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}` as the image and
# produce a confusing ErrImagePull.
#
# Access: `kubectl -n ecepxie exec -it mleval-jupyter-1gpu -- bash`

apiVersion: v1
kind: Pod
metadata:
  name: mleval-jupyter-1gpu
  labels:
    app: mleval
    task: dev-helper
spec:
  restartPolicy: Never
  # Hard 4h cap so a forgotten helper can't idle a GPU forever. NRP bans
  # workloads that "don't end by themselves" (sleep infinity) — a bounded
  # sleep + activeDeadlineSeconds makes this self-terminating and frees the
  # GPU even if we forget to delete it. Bump if a debug session needs longer,
  # but still delete the pod the moment you're done.
  activeDeadlineSeconds: 14400
  # Pull our private ghcr.io image. Secret created via `make k8s-ghcr-pull-secret`.
  imagePullSecrets:
    - name: ghcr-pull
  containers:
    - name: jupyter
      # Image, registry, tag, and GPU type are filled in by envsubst from .env
      # at apply time (see `make k8s-apply-helper`).
      image: ${IMAGE_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
      imagePullPolicy: Always
      # Bounded sleep (4h) — exec in with `kubectl exec -it ... -- bash` to
      # drive `python3 /workspace/run_mlevolve.py` interactively, or invoke the
      # agent's generated code directly to debug task-level failures without
      # re-launching a Job (which would mean ~5 min image pull on a fresh node).
      # NOT `sleep infinity`: that's the NRP-bannable "never ends" pattern and
      # would pin the GPU idle. Matches activeDeadlineSeconds above.
      command: ["sleep", "14400"]

      resources:
        # NRP admission webhook caps controllerless pods at 32 GiB / 16 CPU.
        # See: PODs without controllers are limited to 16 cores and 32 GB of RAM
        # /dev/shm below is medium=Memory and counts against this limit, so
        # 32Gi total = 4Gi shm + 28Gi for Python heap + HF/torch buffers.
        # mvp-010 OOMKilled at 8Gi shm + 24Gi heap; tightening shm to 4Gi
        # buys 4 GiB more heap for Llama-7B fp16 (~13 GB) + AIDE overhead.
        # If still tight, move to a Deployment to lift the 32 GiB cap.
        limits:
          ${GPU_TYPE}: "1"
          memory: "32Gi"
          cpu: "2"
        requests:
          ${GPU_TYPE}: "1"
          memory: "32Gi"
          cpu: "2"

      volumeMounts:
        - name: cache-volume
          mountPath: /cache
        # Notebook scratch. NOT mounted at /workspace because the image's
        # /workspace contains the AIDE sidecar + run_aide.py shim + the editable
        # mleval install — mounting an emptyDir there would mask all of it.
        - name: workspace
          mountPath: /scratch
        - name: dev-shm
          mountPath: /dev/shm
        # Shared trajectory output PVC (CephFS RWX). Same mount path the Job
        # template uses, so notebooks can inspect prior runs in
        # /results/${MLEVAL_RUN_ID}/... and stage task data under /results/data/.
        - name: results
          mountPath: /results

      env:
        # Cache locations (keep heavy HF/Torch artifacts off the rootfs).
        - name: HF_HOME
          value: "/cache/hf"
        - name: TRANSFORMERS_CACHE
          value: "/cache/hf/transformers"
        - name: HF_DATASETS_CACHE
          value: "/cache/hf/datasets"
        - name: TORCH_HOME
          value: "/cache/torch"
        - name: PIP_CACHE_DIR
          value: "/cache/pip"

        - name: PYTHONUNBUFFERED
          value: "1"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "expandable_segments:True"

        # Route AIDE's openai backend at OpenRouter (see entrypoint.sh comment).
        # The openai backend uses chat.completions.create when OPENAI_BASE_URL
        # is set AND the model name isn't gpt-*/o*/codex — exactly our case.
        - name: OPENAI_BASE_URL
          value: "https://openrouter.ai/api/v1"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: mleval-secrets
              key: openrouter-api-key
              optional: true

        # Optional secrets — created via `kubectl apply -f secret.template.yaml`
        # after substituting real values. Marked optional so the pod still
        # starts when the secret hasn't been provisioned yet.
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: mleval-secrets
              key: hf-token
              optional: true
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: mleval-secrets
              key: openrouter-api-key
              optional: true

  # Pin to a specific GPU product (see .env for valid GPU_PRODUCT values).
  nodeSelector:
    nvidia.com/gpu.product: ${GPU_PRODUCT}

  tolerations:
    # Only tolerate taints we're authorized for. Do NOT add
    # `nautilus.io/reservation` (lets pods poach other groups' reserved nodes)
    # or `nautilus.io/hardware=large-gpu` (a hardware-class taint we don't need
    # for a 1-GPU pod and aren't entitled to blanket-tolerate). Per NRP policy
    # you may only tolerate a reservation value if your group is approved for
    # it. Run on unreserved capacity only.
    - key: nvidia.com/gpu
      operator: Exists
      effect: PreferNoSchedule

  volumes:
    - name: cache-volume
      emptyDir:
        sizeLimit: 100Gi
    - name: workspace
      emptyDir:
        sizeLimit: 20Gi
    - name: dev-shm
      # Disk-backed (not medium: Memory) per code review C1 — memory-backed
      # shm counts against the pod's 32 GiB controllerless cap and silently
      # shaved 4-8 GiB off effective heap. DataLoader workers rarely need
      # huge shm; bump sizeLimit if you see "Bus error" or "No space left
      # on device" inside training scripts.
      emptyDir:
        sizeLimit: 8Gi
    - name: results
      persistentVolumeClaim:
        claimName: mleval-results
