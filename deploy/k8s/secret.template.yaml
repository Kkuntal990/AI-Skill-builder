# Reference only. DO NOT `kubectl apply -f` this file directly — it would
# create a Secret with literal "REPLACE_ME" values.
#
# Real provisioning flow:
#
#   1. Fill in OPENROUTER_API_KEY / HF_TOKEN in `.env` (gitignored).
#   2. `make k8s-secret`   # creates this Secret in $K8S_NAMESPACE from .env.
#
# The Makefile target uses `kubectl create secret generic` rather than
# `apply -f` so the real key values never touch this repo.

apiVersion: v1
kind: Secret
metadata:
  name: mleval-secrets
  labels:
    app: mleval
type: Opaque
stringData:
  openrouter-api-key: "REPLACE_ME"
  hf-token: "REPLACE_ME"
