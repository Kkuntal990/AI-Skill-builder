# MVP run #1 — debug-trl-grpo (SkillsBench).
#
#   - 1-hour wall-clock cap (matches SkillsBench's [agent] timeout_sec = 3600)
#   - CPU-only (no GPU request → schedulable anywhere)
#   - baseline cell only (CELL=without_skill); skill A/B comes post-MVP
#
# Do NOT apply this manifest until the docker image has been built and pushed
# AND the user has explicitly approved a live run.

apiVersion: batch/v1
kind: Job
metadata:
  name: mleval-debug-trl-grpo-mvp
  labels:
    app: mleval
    task: debug-trl-grpo
    cell: without_skill
    run_id: mvp-001
spec:
  backoffLimit: 0                # do not retry on failure during MVP
  activeDeadlineSeconds: 4500    # 75 min — 1h budget + 15min slack
  ttlSecondsAfterFinished: 86400 # auto-cleanup pod after 24h

  template:
    metadata:
      labels:
        app: mleval
        task: debug-trl-grpo
        cell: without_skill
    spec:
      restartPolicy: Never
      containers:
        - name: agent
          # Filled in by envsubst at apply time from .env.
          image: ${IMAGE_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          imagePullPolicy: Always

          resources:
            # MLEvolve's reference config uses 21 CPUs per task. debug-trl-grpo
            # is CPU-only and lighter; 8 CPUs + 32Gi gives headroom for the
            # grading-server sidecar and MLEvolve's thread pool without
            # straining typical Nautilus quotas. Bump for LLM-Merging / jigsaw.
            limits:
              cpu: "8"
              memory: "32Gi"
            requests:
              cpu: "8"
              memory: "16Gi"

          env:
            # MLEVAL_RUN_ID, MLEVAL_LLM_MODEL, DEFAULT_SEED come from .env so
            # every Job in a sweep gets the same identifying tags. TASK / CELL
            # / TRAJECTORY_ID are this Job's per-run knobs and stay hardcoded
            # for MVP (one Job per scenario). The orchestrator (task #75)
            # will generate these per-trajectory.
            - name: MLEVAL_RUN_ID
              value: "${MLEVAL_RUN_ID}"
            - name: MLEVAL_TRAJECTORY_ID
              value: "debug-trl-grpo-without_skill-seed${DEFAULT_SEED}"
            - name: TASK
              value: "debug-trl-grpo"
            - name: CELL
              value: "without_skill"
            - name: SEED
              value: "${DEFAULT_SEED}"
            - name: TIME_LIMIT_SECONDS
              value: "3600"
            - name: MLEVAL_OUTPUT_DIR
              value: "/results/${MLEVAL_RUN_ID}/debug-trl-grpo-without_skill-seed${DEFAULT_SEED}"
            - name: MLEVAL_TASK_INSTRUCTION_PATH
              value: "/workspace/task/instruction.md"
            - name: MLEVAL_TASK_DATA_DIR
              value: "/workspace/task/data"
            - name: MLEVAL_PLAYGROUND_DIR
              value: "/workspace/playground"
            - name: MLEVAL_LLM_MODEL
              value: "${MLEVAL_LLM_MODEL}"
            - name: PYTHONUNBUFFERED
              value: "1"

            # API keys (the Secret must exist before the Job is applied).
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mleval-secrets
                  key: openrouter-api-key

          volumeMounts:
            - name: results
              mountPath: /results
            - name: task
              mountPath: /workspace/task
              readOnly: true
            - name: dev-shm
              mountPath: /dev/shm

      tolerations:
        - key: nautilus.io/reservation
          operator: Exists
          effect: NoSchedule

      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: mleval-results
        - name: task
          # TODO(kkokate): replace with a ConfigMap / PVC containing the
          # debug-trl-grpo task spec (instruction.md + data/). For MVP iter 0
          # this can be a hostPath volume on a node where we've staged the
          # data, or you can scp it into the cluster pre-run.
          emptyDir: {}
        - name: dev-shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
