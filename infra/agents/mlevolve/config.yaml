# MLEvolve runtime config — spike profile.
#
# Rendered by entrypoint.sh via `envsubst` before each trajectory, then
# copied over /workspace/mlevolve/config/config.yaml so MLEvolve's
# load_cfg() picks it up.
#
# Key spike-mode decisions vs upstream defaults:
#   - no_submission_mode: FALSE      → keep MLEvolve's native per-node
#                                      submission machinery so the best node's
#                                      predictions are preserved at
#                                      best_submission/submission.csv for our
#                                      held-out grader (mleval.grader). See the
#                                      detailed rationale at the flag below.
#                                      (fork: e-strauss/MLEvolve-generic)
#   - use_grading_server: false      → mle-bench import never triggers
#   - use_coldstart: false           → no domain classifier (would compete
#                                      with our skill_retriever as a second
#                                      knowledge-injection mechanism)
#   - agent.use_global_memory: true  → intra-trajectory experiential memory
#                                      (improve + debug retrieval). Per-pod
#                                      output dir guarantees no cross-cell
#                                      leak — verified at agent_search.py:91
#                                      + entrypoint.sh:90. Embedding model
#                                      pre-warmed on PVC at HF cache.
#   - parallel_search_num: 1         → no parallel branches (sequential)
#   - num_drafts: 5                  → upstream default (reverted from 1; a
#                                      single draft let one buggy lineage doom
#                                      the run + spin the search — spike-022/026)
#   - num_gpus: 1                    → matches our pod request

data_dir: ${PUBLIC_DIR}/input
dataset_dir: ${DATASET_DIR}
desc_file: ${PUBLIC_DIR}/description.md
goal: null
eval: null
exp_name: ${EXP_ID}
exp_id: ${EXP_ID}

log_dir: ${RUNS_DIR}
log_level: INFO
workspace_dir: ${RUNS_DIR}
preprocess_data: True
copy_data: False

# Resources (must match the K8s pod spec; cpu_number must be <= pod CPU)
start_cpu_id: 0
cpu_number: 2

torch_hub_dir: /results/.hf-cache/torch
pretrain_model_dir: /results/.hf-cache/hf

exec:
  # Per-exec subprocess timeout. Decoupled from agent.time_limit so a
  # single training pass can't consume the entire trajectory's wall
  # budget. Default in entrypoint.sh is TIME_LIMIT_SECONDS / 2.
  timeout: ${MLEVAL_EXEC_TIMEOUT_SEC}
  agent_file_name: runfile.py

agent:
  # Basic
  steps: ${STEP_LIMIT}
  # === time_limit is a HINT only ===
  # The field name (`time_limit`) stays because upstream MLEvolve reads it
  # in 4 files (engine/agent_search.py:166, engine/evaluation.py:62,
  # engine/node_selection.py:168, agents/prompts/impl_guideline.py:10).
  # Renaming would require forking 5 source files for cosmetic value.
  #
  # Semantically treat this as `time_limit_hint`:
  #   - influences branching + exploration weights inside MLEvolve
  #   - shown in agent prompts ("Time left ≈ ...")
  #   - DOES NOT gate the search loop (verified at run.py:137 — the
  #     `while completed < total_steps` loop has no time clause)
  #
  # The actual wall cap is enforced by the entrypoint watchdog using
  # TIME_LIMIT_SECONDS. Pass the same value here so MLEvolve's prompts
  # report the correct budget to the agent.
  time_limit: ${TIME_LIMIT_SECONDS}
  initial_drafts: 1
  seed: 0
  data_preview: True

  # LLM — both stages route to our OpenAI-compatible sidecar (OpenRouter).
  # api_key="" lets the sidecar fall back to OPENAI_API_KEY env var.
  code:
    model: ${MLEVAL_LLM_MODEL}
    temp: 0
    base_url: ${OPENAI_BASE_URL}
    api_key: ""
  feedback:
    model: ${MLEVAL_LLM_MODEL}
    temp: 0
    base_url: ${OPENAI_BASE_URL}
    api_key: ""

  check_data_leakage: False
  # use_diff_mode governs how EDITS (debug/improve/evolve/fuse) are applied,
  # NOT drafting (drafts always use stepwise whole-code). True = SEARCH/REPLACE
  # diff patches; False = Base mode, regenerate the whole file each edit.
  # Reverted to True after the spike-012 root-cause was pinned down: the
  # `=======` corruption is NOT primarily the diff applier — it's OUTPUT
  # TRUNCATION at max_tokens=16384 (llm/openai.py warns on finish_reason==
  # length but uses the partial text anyway). Evidence: the corrupting
  # outputs were 44K-71K chars ending mid-statement; one code-review hit
  # out_tokens=16384 exactly. use_diff_mode:False made it WORSE — whole-file
  # regen produces large outputs that truncate more. Diff mode emits small
  # SEARCH/REPLACE edits that rarely approach the cap. Paired with the
  # token_budget sidecar (max_tokens→32768) this removes the observed
  # truncation. (Robust backstop — hard-fail+retry on finish_reason==length
  # — tracked separately.)
  use_diff_mode: True

  # Branch strategy — disabled for spike (single trajectory)
  fusion_vs_evolution_prob: 0.0
  branch_fusion_trigger_prob: 0.0
  max_fusion_drafts: 0

  # Global memory — enabled for MLEvolve's intended intra-trajectory
  # experiential feedback. Memory writes after every successful node
  # (result_parse_agent.py:376-451), reads at improve (planner) and debug
  # stages. Per-trajectory output dir prevents any cross-A/B leak.
  # BAAI/bge-base-en-v1.5 is MLEvolve's upstream default (~440 MB, pre-warmed
  # on PVC). CPU inference — sentence-transformers default.
  use_global_memory: True
  memory_similarity_threshold: 0.7
  memory_embedding_device: cpu
  memory_embedding_model_path: "BAAI/bge-base-en-v1.5"

  search:
    parallel_search_num: 1
    num_gpus: 1

    # num_drafts=5 = upstream MLEvolve default. Reverted 1->5 (2026-06-16):
    # num_drafts=1 gave the root a single independent draft, so one all-buggy
    # draft lineage doomed the whole trajectory and the MCGS search spun to the
    # deadline (no sibling draft, no valid Top-K node — spike-022/026). With 5,
    # a bad lineage leaves 4 other independent attempts. Costs ~5x the codegen +
    # train/eval per trajectory; accepted for robustness.
    num_drafts: 5
    num_bugs: 1
    num_improves: 3
    topk_max_improves: 3

    max_debug_depth: 5
    back_debug_depth: 2
    debug_prob: 1

    metric_improvement_threshold: 0.0001
    max_improve_failure: 3

    branch_stagnation_threshold: 3
    topk_stagnation_threshold: 6
    stagnation_window: 4
    top_candidates_size: 5

    explore_switch_start: 0.5
    explore_switch_end: 0.7
    min_exploration_weight: 0.2

    topk_early_k: 3
    topk_early_max_per_branch: 2
    topk_late_k: 2
    topk_late_max_per_branch: 1

    force_backprop_late_threshold: 0.80
    force_backprop_late_prob: 0.5
    force_backprop_mid_threshold: 0.4
    force_backprop_mid_modulo: 3
    recent_best_window: 4

    fusion_min_time_hours: 999
    fusion_max_time_hours: 999
    fusion_min_successful_nodes: 2
    fusion_min_branches: 2

  decay:
    exploration_constant: 1.414
    lower_bound: 0.5
    alpha: 0.01
    phase_ratios: [0.3, 0.7]

# Coldstart — enabled to match MLEvolve's published config. The domain
# classifier reads `cfg.exp_id` against the Kaggle competition tag JSON
# (engine/coldstart/competition_tag_classified.json) and returns empty
# for unknown tasks (verified: knowledge.py:18-22 graceful no-op). Our
# SAMSum / GSM8K / BoolQ exp_ids are not in the taxonomy so coldstart
# adds nothing to the prompt — but enabling matches MLE-Bench-style
# baseline and avoids us silently diverging from the published config.
coldstart:
  use_coldstart: True
  task_json_path: "engine/coldstart/competition_tag_classified.json"
  model_json_path: "engine/coldstart/models_guidance_classified.json"
  description: ""

# Grading-server escape hatch — the critical knob that lets us run without
# the mle-bench registry import (verified at config/__init__.py:148 and
# engine/validation/quality_check.py:219).
use_grading_server: False

# Fork-only flag. When True it skips the submission.csv requirement and
# swaps prompts to "optimize the validation metric only" + "print Final
# Validation Score". We deliberately set it FALSE so MLEvolve's NATIVE
# per-node submission machinery runs:
#   - executor.isolate_submission_path rewrites the agent's `submission.csv`
#     write to `submission/submission_<node_id>.csv` (node-keyed; the shared
#     run_wd would otherwise clobber it across nodes).
#   - save_best_solution copies the best node's predictions to
#     `best_submission/submission.csv` — the EXACT best model's outputs, with
#     no retraining.
#   - validate_executed_node marks a node buggy if it produced no submission,
#     natively enforcing "the agent must emit per-example predictions".
#   - validate_submission_content_quality (local, task-agnostic) rejects
#     empty/constant submissions.
# Our held-out grader (mleval.grader) then scores best_submission/submission.csv
# against held-out references — the trustworthy A/B metric. MLEvolve's own
# journal metric stays the (gameable) self-reported tree-search signal.
#
# The mle-bench format-validation that False would normally trigger is ALREADY
# neutralized: _validate_submission_with_retry short-circuits to valid when
# use_grading_server=False (engine/validation/quality_check.py:219-221), so no
# mlebench import and no competition sample_submission is needed. The only
# residual coupling — `exp_name.split("_")[2]` in result_parse_agent.py:223,260
# — is made index-safe by the de_kaggle build-time patch.
no_submission_mode: False
